name: Publish T3 Code nightly to COPR

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: Submit even if this nightly tag was already recorded
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: t3code-nightly-copr
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    container: fedora:latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Install Git for checkout
        run: dnf --assumeyes install git
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
      - name: Resolve latest upstream nightly
        id: release
        env:
          FORCE: ${{ inputs.force || 'false' }}
        run: |
          set -euo pipefail
          tag="$(curl --fail --silent --show-error --location \
            'https://api.github.com/repos/pingdotgg/t3code/releases?per_page=30' \
            | jq -r '[.[] | select(.prerelease and (.draft | not))][0].tag_name')"
          test -n "$tag" && test "$tag" != "null"
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
          if [[ "$FORCE" == "true" || "$tag" != "$(tr -d '\n' < packaging/last-built-tag)" ]]; then
            echo 'should_build=true' >> "$GITHUB_OUTPUT"
          else
            echo 'should_build=false' >> "$GITHUB_OUTPUT"
          fi
      - name: Install RPM and COPR tooling
        if: steps.release.outputs.should_build == 'true'
        run: dnf --assumeyes install rpm-build rpmdevtools copr-cli
      - name: Build source RPM
        if: steps.release.outputs.should_build == 'true'
        run: ./scripts/build-srpm.sh "${{ steps.release.outputs.tag }}"
      - name: Configure COPR credentials
        if: steps.release.outputs.should_build == 'true'
        env:
          COPR_CONFIG: ${{ secrets.COPR_CONFIG }}
        run: |
          set -euo pipefail
          test -n "$COPR_CONFIG"
          install -d -m 0700 ~/.config
          printf '%s' "$COPR_CONFIG" > ~/.config/copr
          chmod 0600 ~/.config/copr
      - name: Submit source RPM to COPR
        if: steps.release.outputs.should_build == 'true'
        env:
          COPR_PROJECT: ${{ secrets.COPR_PROJECT }}
        run: |
          set -euo pipefail
          test -n "$COPR_PROJECT"
          copr build "$COPR_PROJECT" rpmbuild/SRPMS/*.src.rpm
      - name: Record successful submission
        if: steps.release.outputs.should_build == 'true'
        env:
          TAG: ${{ steps.release.outputs.tag }}
        run: |
          set -euo pipefail
          printf '%s\n' "$TAG" > packaging/last-built-tag
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add packaging/last-built-tag
          git commit -m "chore: record T3 Code nightly $TAG"
          git push
