name: Publish T3 Code nightly to COPR

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:
    inputs:
      force:
        description: Submit even if this nightly tag was already recorded
        required: false
        default: false
        type: boolean

permissions:
  contents: write

concurrency:
  group: t3code-nightly-copr
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    container: fedora:latest
    defaults:
      run:
        shell: bash
    steps:
      - name: Install release lookup tools
        run: dnf --assumeyes install curl git jq
      - uses: actions/checkout@v5
        with:
          ref: main
          fetch-depth: 0
      - name: Resolve latest upstream nightly
        id: release
        env:
          FORCE: ${{ inputs.force || 'false' }}
          # Authenticated requests avoid shared-runner unauth 403 rate limits.
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          response="$(curl --fail --silent --show-error --location \
            --retry 5 --retry-delay 2 --retry-all-errors \
            -H "Authorization: Bearer ${GITHUB_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            'https://api.github.com/repos/pingdotgg/t3code/releases?per_page=30')"
          tag="$(jq -r '[.[] | select(.prerelease and (.draft | not))][0].tag_name' <<<"$response")"
          if [[ -z "$tag" || "$tag" == "null" ]]; then
            echo "Failed to resolve a non-draft prerelease tag from pingdotgg/t3code" >&2
            jq '.[0:5] | map({tag_name, prerelease, draft, published_at})' <<<"$response" >&2 || true
            exit 1
          fi
          echo "Resolved upstream nightly: $tag"
          printf 'tag=%s\n' "$tag" >> "$GITHUB_OUTPUT"
          last="$(tr -d '\n' < packaging/last-built-tag)"
          if [[ "$FORCE" == "true" || "$tag" != "$last" ]]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
            echo "Will build (force=${FORCE} last=${last})"
          else
            echo "should_build=false" >> "$GITHUB_OUTPUT"
            echo "Skipping; already recorded $tag"
          fi
      - name: Install RPM and COPR tooling
        if: steps.release.outputs.should_build == 'true'
        run: dnf --assumeyes install rpm-build rpmdevtools copr-cli
      - name: Build source RPM
        if: steps.release.outputs.should_build == 'true'
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: ./scripts/build-srpm.sh "${{ steps.release.outputs.tag }}"
      - name: Configure COPR credentials
        if: steps.release.outputs.should_build == 'true'
        env:
          COPR_CONFIG: ${{ secrets.COPR_CONFIG }}
        run: |
          set -euo pipefail
          test -n "$COPR_CONFIG"
          install -d -m 0700 ~/.config
          printf '%s' "$COPR_CONFIG" > ~/.config/copr
          chmod 0600 ~/.config/copr
      - name: Submit source RPM to COPR
        if: steps.release.outputs.should_build == 'true'
        env:
          COPR_PROJECT: ${{ secrets.COPR_PROJECT }}
        run: |
          set -euo pipefail
          test -n "$COPR_PROJECT"
          copr build "$COPR_PROJECT" rpmbuild/SRPMS/*.src.rpm
      - name: Record successful submission
        if: steps.release.outputs.should_build == 'true'
        env:
          TAG: ${{ steps.release.outputs.tag }}
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # actions/checkout marks the workspace safe for the host user, but
          # run steps execute as a different user inside the job container.
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          # Container checkouts can be source archives without a .git directory.
          if ! git rev-parse --is-inside-work-tree >/dev/null 2>&1; then
            git init
            git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
            git fetch --depth=1 origin main
            git reset --hard FETCH_HEAD
            git branch -M main
          fi
          printf '%s\n' "$TAG" > packaging/last-built-tag
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add packaging/last-built-tag
          if git diff --cached --quiet; then
            echo "Nightly $TAG is already recorded"
            exit 0
          fi
          git commit -m "chore: record T3 Code nightly $TAG"
          git push
